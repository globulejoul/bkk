services:

  watcher:
    build: .
    image: flight-watcher:latest
    container_name: flightwatch
    environment:
      DUFFEL_API_KEY: ${DUFFEL_API_KEY:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      TZ: Europe/Paris
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
