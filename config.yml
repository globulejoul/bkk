# ═══════════════════════════════════════════════════════════════
# Flight Watcher v4 — Configuration
# Vacances Zone A (Lyon) 2026-2027 — dates officielles
# ═══════════════════════════════════════════════════════════════

# Aéroports de départ
origins: [CDG, LYS, BSL, GVA, MXP]

# Destinations Thaïlande
# BKK Suvarnabhumi, HKT Phuket, CNX Chiang Mai
destinations: [BKK, HKT, CNX]

# Devise principale (ce que tu paies au final depuis la France)
currency: EUR

adults: 1
max_fly_duration_hours: 18

# Cron pour le scheduler interne (timezone Europe/Paris)
# "0 7,19 * * *" = 2x par jour à 7h et 19h
# "0 */6 * * *" = toutes les 6 heures
# "0 * * * *"   = toutes les heures (max ~700 calls/mois Tequila)
schedule_cron: "0 */6 * * *"

rolling_window_days: 14
rise_threshold_pct: 0.10  # alerte hausse si +10% vs bas 7 derniers jours

# ─── ntfy ──────────────────────────────────────────────────────
ntfy:
  server: https://ntfy.sh
  topic: frigate-maison-jfourt

# ─── Périodes à surveiller (±3j autour de chaque borne) ────────
trips:

  - name: "Toussaint 2026"
    outbound_window: ["2026-10-14", "2026-10-20"]
    return_window: ["2026-10-30", "2026-11-05"]
    price_threshold: 750

  - name: "Noël 2026"
    outbound_window: ["2026-12-16", "2026-12-22"]
    return_window: ["2027-01-01", "2027-01-07"]
    price_threshold: 900

  - name: "Hiver 2027"
    outbound_window: ["2027-02-10", "2027-02-16"]
    return_window: ["2027-02-26", "2027-03-04"]
    price_threshold: 800

  - name: "Printemps 2027"
    outbound_window: ["2027-04-07", "2027-04-13"]
    return_window: ["2027-04-23", "2027-04-29"]
    price_threshold: 800

  - name: "Été 2027 (2-3 sem)"
    outbound_window: ["2027-07-03", "2027-07-20"]
    return_window: ["2027-07-20", "2027-08-15"]
    min_nights: 14
    max_nights: 24
    price_threshold: 850
